---
# HellGPT — Shakespeare Tradition: Slot Vocabulary
# Source: Shakespeare Insult Kit (traditional, widely documented)
# Usage: Procedural "Thou art a [A] [B] [C]" construction
#        LLM may extend each column in-register.
#        Column C may be replaced with a modern target noun.

tradition: shakespeare
file_type: slot_vocabulary

construction_template: "Thou art a {column_a} {column_b} {column_c}."
construction_variants:
  - "Thou art a {column_a} {column_b} {column_c}."
  - "Away, thou {column_a} {column_b} {column_c}!"
  - "Thou {column_a} {column_b} {column_c}!"
  - "What a {column_a} {column_b} {column_c} thou art."

modern_target_template: "Thou art a {column_a} {column_b} {modern_target}."
modern_target_note: >
  Replace column_c with a modern noun when contextually appropriate.
  The anachronism is the joke AND the point.
  Examples: Jenkins pipeline, microservice, pull request, sprint backlog,
  Jira ticket, Docker image, regex, null pointer, memory leak, pivot deck.

