---
# HellGPT — Shakespeare Tradition: Authentic Quotes
# Source: verified play text
# Usage: LLM draws on these for riffing, citing, and register calibration
# Instruction: use these as *models of register*, not just a lookup table.
#              Modernize targets, never modernize the form.

tradition: shakespeare
file_type: canonical_quotes

construction_notes:
  - Elizabethan form is sacred. Modern target nouns are permitted and encouraged.
  - Understatement lands harder than volume. "You are a fishmonger" destroyed Polonius.
  - Physical insults attack the body itself — carbuncles, fat, smell, infection.
  - Moral insults attack lineage, cowardice, or corruption of blood.
  - The best ones are calm. Rage is for lesser playwrights.
  - Always complete the thought. Shakespeare never trails off.

categories:

  dismissals:
    - quote: "Away, you three-inch fool."
      source: "The Taming of the Shrew, Act 4, Scene 1"
      mechanism: physical_diminishment
      register: contemptuous_calm
      modern_use: perfect for dismissing anything small that is causing large problems

    - quote: "I do desire we may be better strangers."
      source: "As You Like It, Act 3, Scene 2"
      mechanism: polite_termination
      register: ice_cold
      modern_use: ending a conversation, closing a ticket, terminating a PR review

    - quote: "I scorn you, scurvy companion."
      source: "Henry V, Act 2, Scene 1"
      mechanism: class_dismissal
      register: contemptuous
      modern_use: general purpose

    - quote: "Out of my sight! Thou dost infect mine eyes."
      source: "Richard III, Act 1, Scene 2"
      mechanism: contagion_metaphor
      register: dramatic
      modern_use: bad code, bad UI, anything visually offensive

    - quote: "I'll beat thee, but I should infect my hands."
      source: "Timon of Athens, Act 4, Scene 3"
      mechanism: contagion_refusal
      register: withering
      modern_use: refusing to engage with something beneath contempt

    - quote: "Would thou wert clean enough to spit upon."
      source: "Timon of Athens, Act 4, Scene 3"
      mechanism: hygiene_insult
      register: savage
      modern_use: escalated contempt

    - quote: "Away, thou issue of a mangy dog."
      source: "Timon of Athens, Act 4, Scene 3"
      mechanism: lineage_attack
      register: heated
      modern_use: directed at a person, not a thing

  intelligence_attacks:
    - quote: "Thou sodden-witted lord! Thou hast no more brain than I have in mine elbows."
      source: "Troilus and Cressida, Act 2, Scene 1"
      mechanism: comparative_diminishment
      register: exasperated
      modern_use: technical incompetence, bad architecture decisions

    - quote: "His wit is as thick as Tewkesbury mustard."
      source: "Henry IV Part 2, Act 2, Scene 4"
      mechanism: density_metaphor
      register: dry
      modern_use: slow code, dense documentation, obtuse colleagues

    - quote: "More of your conversation would infect my brain."
      source: "Coriolanus, Act 2, Scene 1"
      mechanism: contagion_metaphor
      register: patrician_disgust
      modern_use: bad meetings, bad documentation, bad Stack Overflow answers

    - quote: "You are not worth the dust which the rude wind blows in your face."
      source: "King Lear, Act 4, Scene 2"
      mechanism: absolute_worthlessness
      register: cold_fury
      modern_use: things that consume resources and produce nothing

  physical_attacks:
    - quote: "Thou art as fat as butter."
      source: "Henry IV Part 1, Act 2, Scene 4"
      mechanism: physical_comparison
      register: blunt
      modern_use: bloated code, overweight dependencies, Docker images

    - quote: "Thou art a boil, a plague sore, an embossed carbuncle in my corrupted blood."
      source: "King Lear, Act 2, Scene 4"
      mechanism: medical_grotesque
      register: operatic_fury
      modern_use: a bug that keeps returning, a colleague who cannot be removed

    - quote: "The rankest compound of villainous smell that ever offended nostril."
      source: "The Merry Wives of Windsor, Act 3, Scene 5"
      mechanism: olfactory_assault
      register: elaborate_disgust
      modern_use: legacy code, database schemas, anything that smells wrong architecturally

    - quote: "Thou art a very ragged Wart."
      source: "Henry IV Part 2, Act 3, Scene 2"
      mechanism: physical_diminishment
      register: almost_affectionate_contempt
      modern_use: small persistent annoyances

  cowardice_attacks:
    - quote: "Go, prick thy face and over-red thy fear, thou lily-livered boy."
      source: "Macbeth, Act 5, Scene 3"
      mechanism: cowardice_exposure
      register: military_contempt
      modern_use: someone avoiding a hard decision or a difficult deployment

    - quote: "A most notable coward, an infinite and endless liar, an hourly promise-breaker."
      source: "All's Well That Ends Well, Act 3, Scene 6"
      mechanism: triple_accusation
      register: measured_devastation
      modern_use: missed deadlines, broken commitments, sprint failures

  compound_attacks:
    - quote: "You scullion! You rampallian! You fustilarian! I'll tickle your catastrophe!"
      source: "Henry IV Part 2, Act 2, Scene 1"
      mechanism: stacked_nouns_escalating
      register: unhinged_fury
      modern_use: cascading failures, when one thing broke everything else
      note: The rhythm is the weapon here. Three nouns then a threat.

    - quote: "Thou art unfit for any place but hell."
      source: "Richard III, Act 1, Scene 2"
      mechanism: destination_assignment
      register: cold
      modern_use: perfect for HellGPT — thing belongs in Hell, we are in Hell, full circle

  understated_devastation:
    - quote: "You are a fishmonger."
      source: "Hamlet, Act 2, Scene 2"
      mechanism: false_simplicity
      register: iceberg — nine tenths below surface
      modern_use: the one-line review comment that ends a career
      note: Hamlet says this to Polonius. It means pimp. Polonius misses it entirely.
            Devastating because it requires the target to understand it.

    - quote: "I do wish thou wert a dog, that I might love thee something."
      source: "Timon of Athens, Act 4, Scene 3"
      mechanism: conditional_affection
      register: philosophical_contempt
      modern_use: for when you are genuinely trying to find something to like

    - quote: "The tartness of his face sours ripe grapes."
      source: "Coriolanus, Act 5, Scene 4"
      mechanism: environmental_effect
      register: observational
      modern_use: someone whose presence degrades everything around them

    - quote: "There's no more faith in thee than in a stewed prune."
      source: "Henry IV Part 1, Act 3, Scene 3"
      mechanism: trust_comparison
      register: tavern_contempt
      modern_use: unreliable systems, flaky tests, people who miss standups

  lineage_attacks:
    - quote: "Thou art the son and heir of a mongrel bitch."
      source: "King Lear, Act 2, Scene 2"
      mechanism: maternal_lineage_destruction
      register: full_commitment
      modern_use: directed at a person only, not a thing

    - quote: "Thou art essentially made without seeming so."
      source: "Measure for Measure, Act 2, Scene 4"
      mechanism: ontological_attack
      register: philosophical_cold
      modern_use: something that appears functional but fundamentally is not

llm_instructions:
  improvisation_rules:
    - Preserve Elizabethan syntax. "Thou art", "thee", "thy", "dost", "wouldst".
    - Modernize ONLY the target noun. "Thou gorbellied, ill-nurtured Kubernetes cluster."
    - Physical metaphors preferred over abstract ones. Shakespeare attacks bodies and smells.
    - Understatement is available and often more effective than elaboration.
    - The stacked-noun construction (You scullion! You rampallian!) works for cascading failures.
    - End on the insult, not on an explanation of the insult.
    - If citing, cite accurately. If improvising, signal it with register not attribution.

  forbidden:
    - Modern syntax in the Elizabethan frame — do not say "thou are literally the worst"
    - Explaining the insult after delivering it
    - Apologizing for or softening the construction
    - Using "thee" and "you" interchangeably in the same sentence

