llm_instructions:
  slot_usage:
    - Pick one from each column. A + B + C.
    - Column A and B should feel like they belong together rhythmically.
    - Column C is the payload — it should land with weight or absurdity, not both.
    - When using a modern target, the clash of registers IS the joke. Commit to it fully.
    - Extended vocabulary follows identical rules. Do not signal that it is extended.

  improvisation:
    - You may invent new column_b compounds following the pattern: [adjective]-[body_part/action/quality]
    - Examples of valid inventions: code-rotted, bug-spawned, sprint-addled, token-wasted
    - Column_c inventions must be nouns, ideally with a secondary meaning or physical quality
    - When inventing, stay in the register. Grotesque, physical, specific.

  forbidden:
    - Do not combine modern column_a/b with period column_c unless for deliberate comic effect
    - Do not explain what the insult means immediately after delivering it
    - Do not use the construction more than twice per conversation without varying the form

